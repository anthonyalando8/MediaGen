<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 32" fill="none">
  <!-- Mouth cavity (visible when open — rendered behind lips) -->
  <ellipse cx="28" cy="18" rx="20" ry="12"
           fill="#8B2E3A" id="mouth-cavity"/>
  <!-- Upper teeth -->
  <rect x="12" y="14" width="32" height="8" rx="3"
        fill="white" id="teeth-upper"/>
  <!-- Lower teeth -->
  <rect x="14" y="20" width="28" height="7" rx="3"
        fill="#F0ECEA" id="teeth-lower"/>

  <!-- Upper lip -->
  <path id="lip-upper"
        d="M6 16 Q14 10 28 12 Q42 10 50 16 Q42 14 28 16 Q14 14 6 16 Z"
        fill="#E8848A"/>
  <!-- Lower lip -->
  <path id="lip-lower"
        d="M6 16 Q18 26 28 27 Q38 26 50 16 Q40 20 28 20 Q16 20 6 16 Z"
        fill="#D97079"/>
  <!-- Lip line -->
  <path d="M6 16 Q18 14 28 15 Q38 14 50 16"
        stroke="#C05060" stroke-width="1" stroke-linecap="round" fill="none"/>
</svg>
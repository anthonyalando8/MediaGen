<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 24" fill="none">
  <!-- Sclera (white of eye) -->
  <ellipse cx="18" cy="12" rx="16" ry="11"
           fill="white" stroke="#C0A0A4" stroke-width="1.5"/>
  <!-- Iris -->
  <ellipse cx="18" cy="12" rx="9" ry="9"
           fill="#4A7FB5"/>
  <!-- Pupil -->
  <ellipse cx="18" cy="12" rx="5" ry="5"
           fill="#1A1A1A"/>
  <!-- Catchlight -->
  <ellipse cx="22" cy="9" rx="2.5" ry="2.5"
           fill="white" opacity="0.9"/>
  <!-- Upper eyelid shadow -->
  <path d="M2 12 Q18 2 34 12" stroke="#C0A0A4" stroke-width="1.5" stroke-linecap="round"/>
</svg>
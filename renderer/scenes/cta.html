<!-- scenes/cta.html -->
<!-- Variables: {{KEYWORD}}, {{BODY}}, {{HUD_TAG}}, {{BRAND}}, {{LAYOUT}} -->

<style>
/* ── LEFT ─────────────────────────────────────────────── */
.scene[data-layout="left"] .cta-content {
  top: calc(var(--safe-top) + 64px);
  left: calc(var(--left) + 20px);
  right: calc(var(--right) + 60px);
}
.scene[data-layout="left"] .cta-kw {
  animation: titleReveal 0.75s cubic-bezier(0.16,1,0.3,1) 0.28s forwards;
}
.scene[data-layout="left"] .cta-follow {
  left: calc(var(--left) + 20px);
  right: var(--right);
}

/* ── CENTER ───────────────────────────────────────────── */
.scene[data-layout="center"] .cta-content {
  top: calc(var(--safe-top) + 180px);
  left: calc(var(--left) + 40px);
  right: calc(var(--right) + 40px);
  text-align: center;
}
.scene[data-layout="center"] .cta-kw {
  font-weight: 300;
  letter-spacing: 0.04em;
  animation: titleReveal 1.0s cubic-bezier(0.16,1,0.3,1) 0.35s forwards;
}
.scene[data-layout="center"] .cta-rule {
  margin-left: auto; margin-right: auto;
  animation: ruleRevealCenter 0.35s cubic-bezier(0.16,1,0.3,1) 0.90s forwards;
}
.scene[data-layout="center"] .cta-body { text-align: center; }
.scene[data-layout="center"] .cta-follow {
  left: calc(var(--left) + 60px);
  right: calc(var(--right) + 60px);
  text-align: center;
  border-top: 1px solid var(--fg-3);
}
.scene[data-layout="center"] .cta-follow-brand { font-size: 48px; }

/* ── RIGHT ────────────────────────────────────────────── */
.scene[data-layout="right"] .cta-content {
  top: calc(var(--safe-top) + 64px);
  left: calc(var(--left) + 100px);
  right: calc(var(--right) + 20px);
  text-align: right;
}
.scene[data-layout="right"] .cta-kw {
  animation: titleRevealRight 0.75s cubic-bezier(0.16,1,0.3,1) 0.28s forwards;
}
.scene[data-layout="right"] .cta-rule {
  margin-left: auto;
  transform-origin: right center;
}
.scene[data-layout="right"] .cta-body { text-align: right; }
.scene[data-layout="right"] .cta-follow {
  left: calc(var(--left) + 100px);
  right: calc(var(--right) + 20px);
  text-align: right;
}

/* ── FULL ─────────────────────────────────────────────── */
.scene[data-layout="full"] .cta-content {
  top: calc(var(--safe-top) + 30px);
  left: var(--left);
  right: calc(var(--right) + 40px);
}
.scene[data-layout="full"] .cta-kw {
  font-size: calc(var(--sz-stat) * 1.2);
  animation: titleRevealFull 0.65s cubic-bezier(0.16,1,0.3,1) 0.20s forwards;
}
.scene[data-layout="full"] .cta-follow {
  left: var(--left);
  right: var(--right);
}

/* ── SHARED ───────────────────────────────────────────── */
.cta-content {
  position: absolute;
  z-index: var(--z-fg);
}
.cta-kw {
  font-size: var(--sz-stat);
  font-weight: 700;
  letter-spacing: -0.045em;
  line-height: 0.92;
  color: var(--fg);
  text-transform: uppercase;
  opacity: 0;
}
.cta-rule {
  display: block;
  margin-top: 32px;
  width: 48px;
  height: 2px;
  background: var(--acc);
  transform: scaleX(0);
  transform-origin: left center;
  animation: ruleReveal 0.35s cubic-bezier(0.16,1,0.3,1) 0.80s forwards;
}
.cta-body {
  margin-top: 28px;
  font-size: var(--sz-body);
  font-weight: 400;
  line-height: 1.32;
  letter-spacing: -0.01em;
  color: var(--fg-2);
  opacity: 0;
  animation: bodyReveal 0.65s cubic-bezier(0.16,1,0.3,1) 0.95s forwards;
}
.cta-follow {
  position: absolute;
  bottom: calc(var(--safe-bot) + 100px);
  z-index: var(--z-fg);
  border-top: 1px solid var(--fg-3);
  padding-top: 28px;
  opacity: 0;
  animation: bodyReveal 0.60s cubic-bezier(0.16,1,0.3,1) 1.30s forwards;
}
.cta-follow-eyebrow {
  font-size: var(--sz-label);
  font-weight: 400;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--acc);
  margin-bottom: 10px;
}
.cta-follow-brand {
  font-size: 56px;
  font-weight: 700;
  letter-spacing: -0.035em;
  color: var(--fg);
}
</style>

<div class="scene" data-layout="{{LAYOUT}}">
  <div class="rule-left"></div>
  <div class="scene-label">{{HUD_TAG}}</div>
  <div class="cta-content">
    <div class="cta-kw">{{KEYWORD}}</div>
    <span class="cta-rule"></span>
    <div class="cta-body">{{BODY}}</div>
  </div>
  <div class="cta-follow">
    <div class="cta-follow-eyebrow">More on</div>
    <div class="cta-follow-brand">{{BRAND}}</div>
  </div>
  <div class="brand">{{BRAND}}</div>
  <div class="beat-counter">{{BEAT_INDEX}} / {{BEAT_TOTAL}}</div>
  <div class="grain" aria-hidden="true"></div>
  <div class="vignette"></div>
</div>

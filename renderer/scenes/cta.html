<!-- scenes/cta.html -->
<!-- Injected: {{KEYWORD}}, {{BODY}}, {{HUD_TAG}}, {{BRAND}} -->

<style>
.cta-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(55% 45% at 18% 72%, oklch(from var(--acc) 0.3 0.12 h / .4), transparent 65%),
    radial-gradient(40% 35% at 80% 25%, oklch(from var(--acc) 0.22 0.08 h / .25), transparent 65%),
    var(--bg);
}

.cta-content {
  position: absolute;
  top: calc(var(--safe-top) + 90px);
  left: var(--left-mg);
  right: 72px;
  z-index: 4;
}

.cta-keyword {
  font-size: var(--sz-stat);
  font-weight: 700;
  letter-spacing: -0.05em;
  line-height: 0.92;
  color: var(--fg);
  text-transform: uppercase;
  text-shadow: 0 4px 0 oklch(0 0 0 / .45);
  opacity: 0;
  animation: wordIn 0.65s cubic-bezier(.2,.9,.25,1.08) 0.1s forwards;
}

.cta-underline {
  width: 0px;
  height: 5px;
  border-radius: 3px;
  background: var(--acc);
  margin-top: 14px;
  animation: underlineGrow 0.45s ease-out 0.6s forwards;
}
@keyframes underlineGrow {
  from { width: 0px; }
  to   { width: 200px; }
}

.cta-body {
  margin-top: 36px;
  font-size: var(--sz-body);
  font-weight: 500;
  line-height: 1.22;
  letter-spacing: -0.01em;
  color: var(--fg-2);
  text-shadow: 0 2px 0 oklch(0 0 0 / .3);
  opacity: 0;
  animation: fadeUp 0.5s ease-out 0.75s forwards;
}

/* CTA band — inside safe zone, bottom anchor */
.cta-band {
  position: absolute;
  bottom: calc(var(--safe-bot) + 40px);
  left: var(--left-mg);
  right: 72px;
  background: var(--fg);
  border-radius: 18px;
  padding: 22px 24px;
  display: grid;
  grid-template-columns: 52px 1fr auto;
  align-items: center;
  gap: 16px;
  box-shadow:
    0 16px 48px -12px oklch(from var(--acc) l c h / .55),
    0 4px 16px -4px oklch(0 0 0 / .5);
  opacity: 0;
  animation: fadeUp 0.6s ease-out 1.1s forwards;
  z-index: 5;
}

.cta-icon {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  color: var(--acc);
  flex-shrink: 0;
}

/* .cta-copy {

} */
.cta-line-top {
  font-family: "JetBrains Mono", monospace;
  font-size: 14px;
  letter-spacing: 0.14em;
  color: oklch(0.4 0.02 250);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.cta-line-main {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: oklch(0.12 0.018 250);
}

.cta-arrow {
  font-size: 32px;
  color: var(--acc);
}
</style>

<div class="scene">
  <div class="cta-bg"></div>

  <div class="hud-tag">{{HUD_TAG}}</div>

  <div class="cta-content">
    <div class="cta-keyword">{{KEYWORD}}</div>
    <div class="cta-underline"></div>
    <div class="cta-body">{{BODY}}</div>
  </div>

  <div class="cta-band">
    <div class="cta-icon">▶</div>
    <div class="cta-copy">
      <div class="cta-line-top">FOLLOW FOR DAILY</div>
      <div class="cta-line-main">{{BRAND}}.</div>
    </div>
    <div class="cta-arrow">↗</div>
  </div>

  <div class="brand">{{BRAND}}</div>
  <div class="grain"></div>
  <div class="vignette"></div>
</div>

<!-- scenes/insight.html -->
<!-- Variables: {{KEYWORD}}, {{BODY}}, {{HUD_TAG}}, {{BRAND}}, {{LAYOUT}} -->

<style>
/* ── LEFT ─────────────────────────────────────────────── */
.scene[data-layout="left"] .insight-content {
  top: calc(var(--safe-top) + 64px);
  left: calc(var(--left) + 20px);
  right: calc(var(--right) + 160px);
}
.scene[data-layout="left"] .insight-kw {
  animation: titleReveal 0.75s cubic-bezier(0.16,1,0.3,1) 0.30s forwards;
}
/* ── insight-body now position:absolute sibling ─────────
   Previously insight-body was INSIDE insight-content, which meant
   comp-corner's translate(20%, ...) moved both the keyword AND the body
   rightward by the same amount — pushing the body past the right clip edge.

   Fix: declare explicit top per layout so body sits below the keyword
   block at all times, and comp-corner [class$="-body"] can apply its
   own independent (smaller) translate without dragging the keyword with it.

   Mirrors the pattern used by truth-body and flip-body, which have always
   been siblings and have never had this overflow problem.            */
.scene[data-layout="left"] .insight-body {
  top: calc(var(--safe-top) + 420px);
  left: calc(var(--left) + 20px);
  right: calc(var(--right) + 160px);
}

/* ── CENTER ───────────────────────────────────────────── */
.scene[data-layout="center"] .insight-content {
  top: calc(var(--safe-top) + 160px);
  left: calc(var(--left) + 40px);
  right: calc(var(--right) + 40px);
  text-align: center;
}
.scene[data-layout="center"] .insight-kw {
  font-size: calc(var(--sz-stat) * 0.92);
  font-weight: 300;
  letter-spacing: 0.04em;
  animation: titleReveal 1.0s cubic-bezier(0.16,1,0.3,1) 0.40s forwards;
}
.scene[data-layout="center"] .insight-rule {
  margin: 36px auto 0;
  animation: ruleRevealCenter 0.35s cubic-bezier(0.16,1,0.3,1) 1.0s forwards;
}
.scene[data-layout="center"] .insight-body {
  top: calc(var(--safe-top) + 560px);
  left: calc(var(--left) + 40px);
  right: calc(var(--right) + 40px);
  text-align: center;
}

/* ── RIGHT ────────────────────────────────────────────── */
.scene[data-layout="right"] .insight-content {
  top: calc(var(--safe-top) + 64px);
  left: calc(var(--left) + 100px);
  right: calc(var(--right) + 20px);
  text-align: right;
}
.scene[data-layout="right"] .insight-kw {
  animation: titleRevealRight 0.75s cubic-bezier(0.16,1,0.3,1) 0.30s forwards;
}
.scene[data-layout="right"] .insight-rule {
  margin-left: auto;
  transform-origin: right center;
}
.scene[data-layout="right"] .insight-body {
  top: calc(var(--safe-top) + 420px);
  left: calc(var(--left) + 100px);
  right: calc(var(--right) + 20px);
  text-align: right;
}

/* ── FULL ─────────────────────────────────────────────── */
.scene[data-layout="full"] .insight-content {
  top: calc(var(--safe-top) + 30px);
  left: var(--left);
  right: var(--right);
}
.scene[data-layout="full"] .insight-kw {
  font-size: calc(var(--sz-stat) * 1.05);
  animation: titleRevealFull 0.65s cubic-bezier(0.16,1,0.3,1) 0.20s forwards;
}
.scene[data-layout="full"] .insight-body {
  top: calc(var(--safe-top) + 440px);
  left: var(--left);
  right: calc(var(--right) + 40px);
}

/* ── SHARED ───────────────────────────────────────────── */
.insight-content {
  position: absolute;
  z-index: var(--z-fg);
}
.insight-kw {
  font-size: var(--sz-stat);
  font-weight: 700;
  letter-spacing: -0.045em;
  line-height: 0.92;
  color: var(--fg);
  text-transform: uppercase;
  word-break: break-word;
  opacity: 0;
}
.insight-rule {
  display: block;
  margin-top: 32px;
  width: 48px;
  height: 2px;
  background: var(--acc);
  transform: scaleX(0);
  transform-origin: left center;
  animation: ruleReveal 0.35s cubic-bezier(0.16,1,0.3,1) 0.90s forwards;
}

/* insight-body is now a position:absolute sibling of insight-content —
   NOT a child of it. This keeps it independent of comp-corner transforms
   applied to insight-content, matching the pattern of truth-body and
   flip-body which have always been architectural siblings.            */
.insight-body {
  position: absolute;
  z-index: var(--z-fg);
  font-size: var(--sz-body);
  font-weight: 400;
  line-height: 1.32;
  letter-spacing: -0.01em;
  color: var(--fg-2);
  opacity: 0;
  animation: bodyReveal 0.65s cubic-bezier(0.16,1,0.3,1) 1.10s forwards;
}
</style>

<div class="scene" data-layout="{{LAYOUT}}">
  <div class="rule-left"></div>
  <div class="scene-label">{{HUD_TAG}}</div>
  <div class="insight-content">
    <div class="insight-kw">{{KEYWORD}}</div>
    <span class="insight-rule"></span>
  </div>
  <!-- insight-body is a SIBLING of insight-content, NOT a child.
       This prevents comp-corner's translate on insight-content from
       also shifting the body text, which caused right-edge overflow. -->
  <div class="insight-body">{{BODY}}</div>
  <div class="brand">{{BRAND}}</div>
  <div class="beat-counter">{{BEAT_INDEX}} / {{BEAT_TOTAL}}</div>
  <div class="grain" aria-hidden="true"></div>
  <div class="vignette"></div>
</div>

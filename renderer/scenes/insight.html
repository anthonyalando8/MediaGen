<!-- scenes/insight.html -->
<!-- Variables: {{KEYWORD}}, {{BODY}}, {{HUD_TAG}}, {{BRAND}} -->

<!--
  INSIGHT SCENE DESIGN RATIONALE
  ─────────────────────────────────
  Beats 1 and 2. These are the argument and evidence.
  The viewer has been hooked — now they need information fast.

  What the previous design got wrong:
  ─ "depth-ghost" (blurred oversized keyword in background) — this is
    a stock motion design template move. Audiences recognise it and tune out.
  ─ insight-divider with gradient (linear-gradient(90deg, var(--acc), transparent))
    — the fade-to-nothing trick is visually weak. Use a solid rule instead.
  ─ Every element animated simultaneously.

  New composition:
  ─ Left column contains: label, keyword, rule, body.
    These are vertically stacked with generous space between them.
  ─ Right side: empty. The negative space frames the content.
  ─ No background decoration. The background is the BG colour.
    The type carries the visual weight.

  Motion sequence — staggered, each delayed enough to breathe:
  0.00s — label arrives (8px left)
  0.30s — keyword lifts in (28px up) — 0.75s duration
  0.90s — rule draws (0.4s)
  1.10s — body lifts in (14px up) — 0.65s duration

  Total reveal: ~1.8s. Long. Feels editorial, not commercial.
-->

<style>
.insight-content {
  position: absolute;
  top: calc(var(--safe-top) + 64px);
  left: calc(var(--left) + 20px);
  right: calc(var(--right) + 160px);
  z-index: 4;
}

/* Keyword — the statement */
.insight-kw {
  font-size: var(--sz-stat);
  font-weight: 700;
  letter-spacing: -0.045em;
  line-height: 0.92;
  color: var(--fg);
  text-transform: uppercase;

  /* Accent-coloured first line — a typographic trick, not a CSS effect.
     We split the keyword at the first space in the template if possible.
     For simplicity here, the whole keyword is one colour. */

  opacity: 0;
  animation: titleReveal 0.75s cubic-bezier(0.16,1,0.3,1) 0.30s forwards;
}

/* Accent word: the template can wrap specific words in .aw spans */
.insight-kw .aw { color: var(--acc); }

/* Horizontal rule — 2px, accent colour, short (not full-width) */
.insight-rule {
  display: block;
  margin-top: 32px;
  width: 48px;
  height: 2px;
  background: var(--acc);
  transform: scaleX(0);
  transform-origin: left center;
  animation: ruleReveal 0.35s cubic-bezier(0.16,1,0.3,1) 0.90s forwards;
}

/* Body copy */
.insight-body {
  margin-top: 28px;
  font-size: var(--sz-body);
  font-weight: 400;
  line-height: 1.32;
  letter-spacing: -0.01em;
  color: var(--fg-2);

  opacity: 0;
  animation: bodyReveal 0.65s cubic-bezier(0.16,1,0.3,1) 1.10s forwards;
}

/* ── Optional stat/number treatment ──────────────────────────────
   If the keyword contains a number (e.g. "5 HABITS") and we want
   to give the number distinct weight, it can use this class.
   Not required — adds presence when used. */
.stat-num {
  display: block;
  font-size: calc(var(--sz-stat) * 1.4);
  font-weight: 700;
  letter-spacing: -0.06em;
  line-height: 0.82;
  color: var(--acc);
}
</style>

<div class="scene">
  <div class="rule-left"></div>
  <div class="scene-label">{{HUD_TAG}}</div>

  <div class="insight-content">
    <div class="insight-kw">{{KEYWORD}}</div>
    <span class="insight-rule"></span>
    <div class="insight-body">{{BODY}}</div>
  </div>

  <div class="brand">{{BRAND}}</div>
  <div class="vignette"></div>
</div>

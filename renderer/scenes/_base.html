<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<style>

/* ================================================================
   DESIGN TOKENS
   ================================================================ */
:root {
  --bg:    #09090b;
  --fg:    #efefed;
  --fg-2:  #868682;
  --fg-3:  #2a2a28;
  --acc:   #efefed;   /* overridden per-theme */
  --spike: #e8804a;   /* climax override */

  --sz-hero:  168px;
  --sz-stat:  104px;
  --sz-body:   50px;
  --sz-label:  20px;
  --sz-brand:  22px;

  --left:      80px;
  --right:     80px;
  --safe-top: 260px;
  --safe-bot: 500px;

  /* ── Z-DEPTH LAYER SYSTEM ──────────────────────────
     Every positioned element must use one of these.
     Never use a bare integer — always var(--z-*).
     0  ambient:  emotion tints, base atmosphere
     1  bg:       scene-specific glows, bg variants
     2  mid:      particles, texture overlays
     3  chrome:   structural lines (rule-left)
     4  fg:       all text content
     5  ui:       scene-label, brand, beat-counter
     8  grain:    film grain (above content, below vignette)
     9  vignette: always on top of everything
    99  flash:    transition flash overlays
  ────────────────────────────────────────────────── */
  --z-ambient:  0;
  --z-bg:       1;
  --z-mid:      2;
  --z-chrome:   3;
  --z-fg:       4;
  --z-ui:       5;
  --z-grain:    8;
  --z-vignette: 9;
  --z-flash:    99;
}

/* Local font — no network request, works offline */
@font-face {
  font-family: "Space Grotesk";
  src: local("Space Grotesk"),
       url("../../assets/fonts/Space_Grotest/SpaceGrotesk-VariableFont_wght.ttf") format("truetype");
  font-weight: 100 900;
  font-display: swap;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: var(--bg);
  color: var(--fg);
  font-family: "Space Grotesk", "Segoe UI", "Helvetica Neue", ui-sans-serif, sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: geometricPrecision;
}

.scene {
  position: relative;
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: var(--bg);
}

/* ================================================================
   LAYOUT VARIANT SYSTEM
   ================================================================ */

/* LEFT — editorial, left anchor */
.scene[data-layout="left"] .rule-left { display: block; }
.scene[data-layout="left"] .scene-label { left: calc(var(--left) + 18px); }

/* CENTER — no rule, symmetric */
.scene[data-layout="center"] .rule-left { display: none; }
.scene[data-layout="center"] { text-align: center; }
.scene[data-layout="center"] .scene-label {
  left: 0; right: 0;
  text-align: center;
}
.scene[data-layout="center"] .h-rule,
.scene[data-layout="center"] .insight-rule,
.scene[data-layout="center"] .cta-rule {
  margin-left: auto;
  margin-right: auto;
}

/* RIGHT — flipped anchor */
.scene[data-layout="right"] .rule-left {
  left: auto;
  right: var(--right);
}
.scene[data-layout="right"] .rule-left::after { left: 0; }
.scene[data-layout="right"] .scene-label {
  left: auto;
  right: calc(var(--right) + 18px);
}
.scene[data-layout="right"] .brand {
  right: auto;
  left: var(--left);
}

/* FULL — bleed, no margins */
.scene[data-layout="full"] .rule-left { display: none; }
.scene[data-layout="full"] .scene-label { left: 40px; }
.scene[data-layout="full"] { --left: 40px; --right: 40px; }

/* ================================================================
   STRUCTURAL CHROME
   ================================================================ */
.rule-left {
  position: absolute;
  top: 0; bottom: 0;
  left: var(--left);
  width: 1px;
  background: var(--fg-3);
  z-index: var(--z-chrome);
}
.rule-left::after {
  content: "";
  position: absolute;
  top: var(--safe-top);
  width: 1px;
  height: 40px;
  background: var(--acc);
}

.scene-label {
  position: absolute;
  top: calc(var(--safe-top) + 16px);
  left: calc(var(--left) + 18px);
  font-size: var(--sz-label);
  font-weight: 400;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--fg-2);
  z-index: var(--z-ui);
  opacity: 0;
  animation: labelReveal 0.55s cubic-bezier(0.16,1,0.3,1) 0.08s forwards;
}

.brand {
  position: absolute;
  bottom: calc(var(--safe-bot) + 44px);
  right: var(--right);
  font-size: var(--sz-brand);
  font-weight: 500;
  letter-spacing: 0.03em;
  color: var(--fg-2);
  opacity: 0.3;
  z-index: var(--z-ui);
}

/* ================================================================
   BEAT COUNTER  —  Phase 3
   ----------------------------------------------------------------
   Tiny HUD metadata: "02 / 06"
   Sits opposite brand. 0.18 opacity — present, not readable copy.
   Right-layout mirrors to right (brand moves left, counter right).
   ================================================================ */
.beat-counter {
  position: absolute;
  bottom: calc(var(--safe-bot) + 44px);
  left: var(--left);
  font-size: 18px;
  font-weight: 400;
  letter-spacing: 0.18em;
  font-variant-numeric: tabular-nums;
  color: var(--fg-2);
  opacity: 0;
  z-index: var(--z-ui);
  animation: beatCounterReveal 0.45s ease-out 0.80s forwards;
}
.scene[data-layout="right"] .beat-counter {
  left: auto;
  right: var(--right);
}
.scene[data-layout="full"] .beat-counter {
  left: var(--left);
}
@keyframes beatCounterReveal {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 0.18; transform: translateY(0); }
}

/* ================================================================
   KEYWORD WORD SPANS  —  Phase 3
   ----------------------------------------------------------------
   capture.js wraps each word in <span class="kw-word">.
   Animated underline expands per-word via --word-index stagger
   and --kw-settle-delay (both set by inject.js).
   ================================================================ */
.kw-word {
  display: inline-block;
  position: relative;
  white-space: nowrap;
}
.kw-word::after {
  content: '';
  position: absolute;
  bottom: -6px;
  left: 0;
  width: 100%;
  height: 2px;
  background: var(--acc);
  transform: scaleX(0);
  transform-origin: left center;
  animation: kwWordUnderline 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  animation-delay: calc(
    var(--kw-settle-delay, 1.2s) +
    (var(--word-index, 0) * 0.08s)
  );
}
@keyframes kwWordUnderline {
  from { transform: scaleX(0); }
  to   { transform: scaleX(1); }
}

/* ================================================================
   BODY LINE SPANS  —  Phase 3
   ----------------------------------------------------------------
   capture.js wraps each sentence in <span class="body-line">.
   Lines are display:block, enter independently.
   Delays set by inject.js via --body-line-N-delay.
   Parent body animation suppressed by inject.js.
   ================================================================ */
.body-line {
  display: block;
  opacity: 0;
  animation: bodyLineReveal 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.body-line:nth-child(1) { animation-delay: var(--body-line-1-delay, 1.1s); }
.body-line:nth-child(2) { animation-delay: var(--body-line-2-delay, 1.2s); }
.body-line:nth-child(3) { animation-delay: var(--body-line-3-delay, 1.3s); }
@keyframes bodyLineReveal {
  0%   { opacity: 0; transform: translateY(10px); }
  100% { opacity: 1; transform: translateY(0px);  }
}

/* ================================================================
   VIGNETTE — directional, energy-responsive  —  Phase 4
   ----------------------------------------------------------------
   --vignette-strength multiplier set by inject.js (default 1.0).
   All opacity stops scaled via calc() — shape stays constant,
   only darkness changes with energy/scene type.

   inject.js values:
     payoff:  0.68  (open, earned)
     tension: 1.35  (claustrophobic)
     climax:  1.25  (heavy frame)
     hook:    1.10  (elevated)
     energy=high: 1.30 | energy=low: 0.72
   ================================================================ */
.vignette {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: var(--z-vignette);
}
/* Left: darker right edge, open left */
.scene[data-layout="left"] .vignette,
.scene:not([data-layout]) .vignette {
  background:
    linear-gradient(100deg,
      transparent 35%,
      oklch(0 0 0 / calc(.22 * var(--vignette-strength, 1))) 100%),
    linear-gradient(to bottom,
      oklch(0 0 0 / calc(.40 * var(--vignette-strength, 1))) 0%,
      transparent 15%,
      transparent 78%,
      oklch(0 0 0 / calc(.55 * var(--vignette-strength, 1))) 100%);
}
/* Center: symmetric top/bottom */
.scene[data-layout="center"] .vignette {
  background:
    linear-gradient(to bottom,
      oklch(0 0 0 / calc(.45 * var(--vignette-strength, 1))) 0%,
      transparent 20%,
      transparent 75%,
      oklch(0 0 0 / calc(.60 * var(--vignette-strength, 1))) 100%);
}
/* Right: darker left edge */
.scene[data-layout="right"] .vignette {
  background:
    linear-gradient(280deg,
      transparent 35%,
      oklch(0 0 0 / calc(.22 * var(--vignette-strength, 1))) 100%),
    linear-gradient(to bottom,
      oklch(0 0 0 / calc(.40 * var(--vignette-strength, 1))) 0%,
      transparent 15%,
      transparent 78%,
      oklch(0 0 0 / calc(.55 * var(--vignette-strength, 1))) 100%);
}
/* Full: heavier top/bottom only */
.scene[data-layout="full"] .vignette {
  background:
    linear-gradient(to bottom,
      oklch(0 0 0 / calc(.55 * var(--vignette-strength, 1))) 0%,
      transparent 18%,
      transparent 72%,
      oklch(0 0 0 / calc(.70 * var(--vignette-strength, 1))) 100%);
}

/* ================================================================
   MOTION SYSTEM
   ================================================================ */

@keyframes labelReveal {
  from { opacity: 0; transform: translateX(-10px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes titleReveal {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes titleRevealRight {
  from { opacity: 0; transform: translateX(32px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes titleRevealFull {
  from { opacity: 0; transform: translateY(48px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes bodyReveal {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes ruleReveal {
  from { transform: scaleX(0); transform-origin: left center; }
  to   { transform: scaleX(1); transform-origin: left center; }
}
@keyframes ruleRevealCenter {
  from { transform: scaleX(0); transform-origin: center center; }
  to   { transform: scaleX(1); transform-origin: center center; }
}
@keyframes cameraSettle {
  from { transform: translateY(8px); }
  to   { transform: translateY(0); }
}

</style>
<link rel="stylesheet" href="../motion/camera.css">
<link rel="stylesheet" href="../motion/cinematic.css">
<link rel="stylesheet" href="../motion/entries.css">
<link rel="stylesheet" href="../motion/overlays.css">
</head>
<body>
{{SCENE_CONTENT}}
<script src="../lib/inject.js"></script>
</body>
</html>

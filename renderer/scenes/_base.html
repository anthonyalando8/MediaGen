<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<style>

/* ================================================================
   DESIGN TOKENS
   ================================================================ */
:root {
  --bg:    #09090b;
  --fg:    #efefed;
  --fg-2:  #868682;
  --fg-3:  #2a2a28;
  --acc:   #efefed;   /* overridden per-theme */
  --spike: #e8804a;   /* climax override */

  --sz-hero:  168px;
  --sz-stat:  104px;
  --sz-body:   50px;
  --sz-label:  20px;
  --sz-brand:  22px;

  --left:      80px;
  --right:     80px;
  --safe-top: 260px;
  --safe-bot: 500px;
}

/* Local font — no network request, works offline */
@font-face {
  font-family: "Space Grotesk";
  src: local("Space Grotesk"),
       url("../../assets/fonts/Space_Grotest/SpaceGrotesk-VariableFont_wght.ttf") format("truetype");
  font-weight: 100 900;
  font-display: swap;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: var(--bg);
  color: var(--fg);
  font-family: "Space Grotesk", "Segoe UI", "Helvetica Neue", ui-sans-serif, sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: geometricPrecision;
}

.scene {
  position: relative;
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: var(--bg);
}

/* ================================================================
   LAYOUT VARIANT SYSTEM
   ----------------------------------------------------------------
   The scene-level HTML sets a data-layout attribute.
   CSS uses that to shift composition without changing structure.

   Variants:
     left     — default. Left-anchored editorial. Rule on left.
     center   — centered type. No rule. Used for calm/analytical.
     right    — right-anchored. Tension from reversed expectation.
     full     — type fills full width with no margins. Intense only.
   ================================================================ */

/* LEFT (default) — editorial, left anchor */
.scene[data-layout="left"] .rule-left { display: block; }
.scene[data-layout="left"] .scene-label { left: calc(var(--left) + 18px); }

/* CENTER — no rule, symmetric */
.scene[data-layout="center"] .rule-left { display: none; }
.scene[data-layout="center"] { text-align: center; }
.scene[data-layout="center"] .scene-label {
  left: 0; right: 0;
  text-align: center;
}
.scene[data-layout="center"] .h-rule,
.scene[data-layout="center"] .insight-rule,
.scene[data-layout="center"] .cta-rule {
  margin-left: auto;
  margin-right: auto;
}

/* RIGHT — flipped anchor */
.scene[data-layout="right"] .rule-left {
  left: auto;
  right: var(--right);
}
.scene[data-layout="right"] .rule-left::after { left: 0; }
.scene[data-layout="right"] .scene-label {
  left: auto;
  right: calc(var(--right) + 18px);
}
.scene[data-layout="right"] .brand {
  right: auto;
  left: var(--left);
}

/* FULL — bleed, no margins, type at maximum scale */
.scene[data-layout="full"] .rule-left { display: none; }
.scene[data-layout="full"] .scene-label { left: 40px; }
.scene[data-layout="full"] { --left: 40px; --right: 40px; }

/* ================================================================
   STRUCTURAL CHROME
   ================================================================ */
.rule-left {
  position: absolute;
  top: 0; bottom: 0;
  left: var(--left);
  width: 1px;
  background: var(--fg-3);
  z-index: 3;
}
.rule-left::after {
  content: "";
  position: absolute;
  top: var(--safe-top);
  width: 1px;
  height: 40px;
  background: var(--acc);
}

.scene-label {
  position: absolute;
  top: calc(var(--safe-top) + 16px);
  left: calc(var(--left) + 18px);
  font-size: var(--sz-label);
  font-weight: 400;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--fg-2);
  z-index: 5;
  opacity: 0;
  animation: labelReveal 0.55s cubic-bezier(0.16,1,0.3,1) 0.08s forwards;
}

.brand {
  position: absolute;
  bottom: calc(var(--safe-bot) + 44px);
  right: var(--right);
  font-size: var(--sz-brand);
  font-weight: 500;
  letter-spacing: 0.03em;
  color: var(--fg-2);
  opacity: 0.3;
  z-index: 5;
}

/* ================================================================
   VIGNETTE — directional, not radial
   ================================================================ */
.vignette {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 9;
}
/* Left layout: darker right, open left */
.scene[data-layout="left"] .vignette,
.scene:not([data-layout]) .vignette {
  background:
    linear-gradient(100deg, transparent 35%, oklch(0 0 0 / .22) 100%),
    linear-gradient(to bottom, oklch(0 0 0 / .4) 0%, transparent 15%, transparent 78%, oklch(0 0 0 / .55) 100%);
}
/* Center layout: symmetric fade top/bottom */
.scene[data-layout="center"] .vignette {
  background:
    linear-gradient(to bottom, oklch(0 0 0 / .45) 0%, transparent 20%, transparent 75%, oklch(0 0 0 / .6) 100%);
}
/* Right layout: darker left */
.scene[data-layout="right"] .vignette {
  background:
    linear-gradient(280deg, transparent 35%, oklch(0 0 0 / .22) 100%),
    linear-gradient(to bottom, oklch(0 0 0 / .4) 0%, transparent 15%, transparent 78%, oklch(0 0 0 / .55) 100%);
}
/* Full layout: heavier top/bottom only */
.scene[data-layout="full"] .vignette {
  background:
    linear-gradient(to bottom, oklch(0 0 0 / .55) 0%, transparent 18%, transparent 72%, oklch(0 0 0 / .7) 100%);
}

/* ================================================================
   MOTION SYSTEM
   ----------------------------------------------------------------
   Style variants also shift animation direction:
     left   → titles come from below (default)
     center → titles come from below, slightly further
     right  → titles come from right
     full   → titles come from below, larger displacement

   One easing throughout: cubic-bezier(0.16, 1, 0.3, 1)
   ================================================================ */

@keyframes labelReveal {
  from { opacity: 0; transform: translateX(-10px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes titleReveal {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes titleRevealRight {
  from { opacity: 0; transform: translateX(32px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes titleRevealFull {
  from { opacity: 0; transform: translateY(48px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes bodyReveal {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes ruleReveal {
  from { transform: scaleX(0); transform-origin: left center; }
  to   { transform: scaleX(1); transform-origin: left center; }
}
@keyframes ruleRevealCenter {
  from { transform: scaleX(0); transform-origin: center center; }
  to   { transform: scaleX(1); transform-origin: center center; }
}
@keyframes cameraSettle {
  from { transform: translateY(8px); }
  to   { transform: translateY(0); }
}

</style>
<link rel="stylesheet" href="../motion/camera.css">
<link rel="stylesheet" href="../motion/entries.css">
<link rel="stylesheet" href="../motion/overlays.css">
<script src="../lib/inject.js"></script>
</head>
<body>
{{SCENE_CONTENT}}
</body>
</html>

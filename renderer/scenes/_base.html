<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<style>

/* ================================================================
   DESIGN TOKENS
   ----------------------------------------------------------------
   2-value palette: --bg (near-black) + --acc (single accent hue).
   Everything else is neutral greys. No secondary accents.
   No gradients. No decorative colour.
   ================================================================ */
:root {
  --bg:    #09090b;
  --fg:    #efefed;
  --fg-2:  #868682;
  --fg-3:  #2a2a28;
  --acc:   #efefed;   /* overridden per-theme to a single hue */

  /* Fixed type scale — rendered at fixed 1080px */
  --sz-hero:    168px;
  --sz-stat:    104px;
  --sz-body:     50px;
  --sz-label:    20px;
  --sz-brand:    22px;

  /* Layout constants */
  --left:        80px;
  --right:       80px;
  --safe-top:   260px;   /* TikTok UI obstruction — top */
  --safe-bot:   500px;   /* TikTok UI obstruction — from bottom */
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: var(--bg);
  color: var(--fg);
  font-family: "Space Grotesk", "Helvetica Neue", ui-sans-serif, sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: geometricPrecision;
}

.scene {
  position: relative;
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: var(--bg);
}

/* ================================================================
   STRUCTURAL CHROME  —  NEVER ANIMATES
   ----------------------------------------------------------------
   One hairline rule on the left edge. That is the only persistent
   visual element. It replaces the 5px coloured bar (too decorative)
   and the particles, grids, ghost words.
   ================================================================ */
.rule-left {
  position: absolute;
  top: 0;
  bottom: 0;
  left: var(--left);
  width: 1px;
  background: var(--fg-3);
  z-index: 3;
}

/* Short accent segment at the top of the rule, within the safe zone */
.rule-left::after {
  content: "";
  position: absolute;
  top: var(--safe-top);
  width: 1px;
  height: 40px;
  background: var(--acc);
}

/* Scene category label — top-left, always monospace, always small */
.scene-label {
  position: absolute;
  top: calc(var(--safe-top) + 16px);
  left: calc(var(--left) + 18px);
  font-size: var(--sz-label);
  font-weight: 400;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--fg-2);
  z-index: 5;
  opacity: 0;
  animation: labelReveal 0.55s cubic-bezier(0.16,1,0.3,1) 0.08s forwards;
}

/* Brand — bottom right, very dim */
.brand {
  position: absolute;
  bottom: calc(var(--safe-bot) + 44px);
  right: var(--right);
  font-size: var(--sz-brand);
  font-weight: 500;
  letter-spacing: 0.03em;
  color: var(--fg-2);
  opacity: 0.3;
  z-index: 5;
}

/* ================================================================
   VIGNETTE
   ----------------------------------------------------------------
   Directional, not radial. Darker at right and at top/bottom edges.
   Left side stays open — that is where the type lives.
   Grain and halation belong in the Python post-processing layer,
   not here. Removing the SVG feTurbulence grain from HTML removes
   the primary source of "AI generator" visual noise.
   ================================================================ */
.vignette {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 9;
  background:
    linear-gradient(100deg, transparent 35%, oklch(0 0 0 / .22) 100%),
    linear-gradient(to bottom,
      oklch(0 0 0 / .4) 0%,
      transparent 15%,
      transparent 78%,
      oklch(0 0 0 / .55) 100%);
}

/* ================================================================
   MOTION LANGUAGE
   ----------------------------------------------------------------

   EASING: cubic-bezier(0.16, 1, 0.3, 1)
   ─ Expo-out. Fast exit, long slow arrival.
   ─ Standard in premium product UI (Linear, Arc, Apple HIG).
   ─ Reads as physical weight, not algorithmic spring.

   DIRECTION: always translateY(upward). Never scale. Never rotate.
   ─ All content enters from below. The eye reads it as arriving,
     not popping. Consistent direction = coherent space.

   DELAY LADDER: content reveals have 80–120ms between layers.
   ─ Label first (sets context, fastest).
   ─ Keyword second (the argument, largest, most delay).
   ─ Divider third (breath, very fast draw).
   ─ Body last (explanation, slowest fade).
   ─ The audience reads each before the next interrupts.

   STILLNESS: decorative elements do NOT animate.
   ─ Background is static.
   ─ Vignette is static.
   ─ Rule is static.
   ─ Brand is static.
   Only the content sequence moves — and only once, forward.

   DURATION: longer than you expect.
   ─ 600–900ms for headline. 400–600ms for body.
   ─ Short animations read as nervousness. Slow reads as confidence.
   ================================================================ */

/* Label: slides in from the left — lateral, not vertical */
@keyframes labelReveal {
  from { opacity: 0; transform: translateX(-10px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* Headline: comes from below, decelerates to rest */
@keyframes titleReveal {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Body: gentler lift — smaller displacement, longer duration */
@keyframes bodyReveal {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Divider: draws left-to-right */
@keyframes ruleReveal {
  from { transform: scaleX(0); transform-origin: left center; }
  to   { transform: scaleX(1); transform-origin: left center; }
}

/* Scene settle: barely-perceptible camera arriving at rest.
   Applied only on hook. 8px drift over 1.8s — feel it, not see it. */
@keyframes cameraSettle {
  from { transform: translateY(8px); }
  to   { transform: translateY(0);   }
}

/* ================================================================
   TYPOGRAPHY DEFAULTS
   ================================================================ */
.headline {
  font-size: var(--sz-hero);
  font-weight: 700;
  letter-spacing: -0.05em;
  line-height: 0.90;
  color: var(--fg);
  text-transform: uppercase;
  /* No text-shadow. Shadow on text is almost always a mistake. */
}

.subheadline {
  font-size: var(--sz-stat);
  font-weight: 700;
  letter-spacing: -0.04em;
  line-height: 0.92;
  color: var(--fg);
  text-transform: uppercase;
}

.body-copy {
  font-size: var(--sz-body);
  font-weight: 400;
  line-height: 1.28;
  letter-spacing: -0.01em;
  color: var(--fg-2);
}

/* Accent coloured first word — pulls eye to the start of body */
.body-copy .accent-word {
  color: var(--acc);
  font-weight: 600;
}

/* Thin rule between headline and body */
.h-rule {
  display: block;
  height: 1px;
  background: var(--fg-3);
  transform: scaleX(0);
  transform-origin: left center;
}
.h-rule.accent {
  background: var(--acc);
  height: 2px;
}

</style>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
{{SCENE_CONTENT}}
</body>
</html>

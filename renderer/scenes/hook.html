<!-- scenes/hook.html -->
<!-- Variables: {{KEYWORD}}, {{BODY}}, {{HUD_TAG}}, {{BRAND}}, {{LAYOUT}} -->
<!--
  Layout drives everything:
  left    → big keyword top, body bottom-third. Camera settle. (contrarian, builder)
  center  → keyword centered vertically, body centered below. Calm entry. (calm, analytical)
  right   → keyword right-anchored, type slides in from right. (cinematic)
  full    → keyword bleeds edge-to-edge at max size. No margins. Aggressive. (intense)
-->

<style>
/* ── LEFT (default) ───────────────────────────────────── */
.scene[data-layout="left"] { animation: cameraSettle 1.8s cubic-bezier(0.16,1,0.3,1) forwards; }
.scene[data-layout="left"] .hook-bg {
  background: radial-gradient(80% 60% at 0% 0%, oklch(from var(--acc) 0.22 0.04 h / .08), transparent 60%), var(--bg);
}
.scene[data-layout="left"] .hook-kw-wrap {
  top: calc(var(--safe-top) + 80px);
  left: var(--left);
  right: 0;
}
.scene[data-layout="left"] .hook-kw {
  font-size: var(--sz-hero);
  animation: titleReveal 0.85s cubic-bezier(0.16,1,0.3,1) 0.40s forwards;
}
.scene[data-layout="left"] .hook-body {
  top: calc(var(--safe-top) + 700px);
  left: var(--left);
  right: calc(var(--right) + 140px);
}

/* ── CENTER ───────────────────────────────────────────── */
.scene[data-layout="center"] .hook-bg {
  background: radial-gradient(60% 50% at 50% 45%, oklch(from var(--acc) 0.18 0.03 h / .07), transparent 65%), var(--bg);
}
.scene[data-layout="center"] .hook-kw-wrap {
  top: calc(var(--safe-top) + 220px);
  left: var(--left);
  right: var(--right);
  text-align: center;
}
.scene[data-layout="center"] .hook-kw {
  font-size: var(--sz-stat);
  font-weight: 300;          /* light weight for calm style */
  letter-spacing: 0.06em;    /* wide tracking — analytical, considered */
  text-transform: uppercase;
  animation: titleReveal 1.1s cubic-bezier(0.16,1,0.3,1) 0.50s forwards;
}
.scene[data-layout="center"] .hook-rule {
  margin-left: auto;
  margin-right: auto;
  animation: ruleRevealCenter 0.45s cubic-bezier(0.16,1,0.3,1) 1.30s forwards;
}
.scene[data-layout="center"] .hook-body {
  top: calc(var(--safe-top) + 560px);
  left: calc(var(--left) + 60px);
  right: calc(var(--right) + 60px);
  text-align: center;
}

/* ── RIGHT ────────────────────────────────────────────── */
.scene[data-layout="right"] .hook-bg {
  background: radial-gradient(70% 55% at 100% 0%, oklch(from var(--acc) 0.20 0.04 h / .09), transparent 60%), var(--bg);
}
.scene[data-layout="right"] .hook-kw-wrap {
  top: calc(var(--safe-top) + 80px);
  left: 0;
  right: var(--right);
  text-align: right;
}
.scene[data-layout="right"] .hook-kw {
  font-size: var(--sz-hero);
  animation: titleRevealRight 0.85s cubic-bezier(0.16,1,0.3,1) 0.40s forwards;
}
.scene[data-layout="right"] .hook-rule {
  margin-left: auto;
  transform-origin: right center;
  animation: ruleReveal 0.45s cubic-bezier(0.16,1,0.3,1) 0.90s forwards;
}
.scene[data-layout="right"] .hook-body {
  top: calc(var(--safe-top) + 700px);
  left: calc(var(--left) + 100px);
  right: var(--right);
  text-align: right;
}

/* ── FULL ─────────────────────────────────────────────── */
.scene[data-layout="full"] .hook-bg {
  background: radial-gradient(90% 65% at 50% 30%, oklch(from var(--acc) 0.25 0.06 h / .10), transparent 65%), var(--bg);
}
.scene[data-layout="full"] .hook-kw-wrap {
  top: calc(var(--safe-top) + 40px);
  left: var(--left);
  right: 0;
}
.scene[data-layout="full"] .hook-kw {
  font-size: calc(var(--sz-stat) * 1.15);  /* full bleed — capped to avoid wrapping */
  line-height: 0.84;
  animation: titleRevealFull 0.70s cubic-bezier(0.16,1,0.3,1) 0.25s forwards;
}
.scene[data-layout="full"] .hook-body {
  top: calc(var(--safe-top) + 840px);
  left: var(--left);
  right: calc(var(--right) + 60px);
  font-size: calc(var(--sz-body) * 1.08);
}

/* ── SHARED base styles (all layouts) ────────────────── */
.hook-bg {
  position: absolute; inset: 0;
}
.hook-kw-wrap {
  position: absolute;
  z-index: var(--z-fg);
}
.hook-kw {
  font-weight: 700;
  letter-spacing: -0.055em;
  line-height: 0.88;
  color: var(--fg);
  text-transform: uppercase;
  word-break: break-word;
  opacity: 0;
  /* animation set per-layout above */
}
.hook-rule {
  display: block;
  margin-top: 20px;
  width: min(600px, calc(1080px - var(--left) * 2));
  height: 2px;
  background: var(--acc);
  transform: scaleX(0);
  transform-origin: left center;
  animation: ruleReveal 0.45s cubic-bezier(0.16,1,0.3,1) 0.90s forwards;
}
.hook-body {
  position: absolute;
  z-index: var(--z-fg);
  font-size: var(--sz-body);
  font-weight: 400;
  line-height: 1.30;
  letter-spacing: -0.01em;
  color: var(--fg-2);
  opacity: 0;
  animation: bodyReveal 0.70s cubic-bezier(0.16,1,0.3,1) 1.05s forwards;
}

/* ── AMBIENT GLOW ─────────────────────────────────────────────── */
/* Sits at --z-bg (1) — behind content, above bg colour.
   Breathes slowly so the background never feels truly static.
   Each layout variant positions the glow source differently. */
.hook-ambient-glow {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: var(--z-bg);
  /* Static opacity — no animation: infinite alternate is invisible
     under frame-seek rendering. Depth is constant, not animated. */
  opacity: 0.75;
}
/* Left: corner bloom from top-left — editorial energy source */
.scene[data-layout="left"] .hook-ambient-glow {
  background:
    radial-gradient(ellipse 55% 40% at 0% 0%, oklch(from var(--acc) 0.30 0.07 h / .10), transparent 65%),
    radial-gradient(ellipse 35% 55% at 100% 100%, oklch(from var(--acc) 0.20 0.04 h / .05), transparent 70%);
}
/* Full: central overhead bloom — aggressive, fills frame */
.scene[data-layout="full"] .hook-ambient-glow {
  background:
    radial-gradient(ellipse 80% 45% at 50% -5%, oklch(from var(--acc) 0.28 0.06 h / .09), transparent 65%),
    radial-gradient(ellipse 40% 30% at 50% 100%, oklch(from var(--acc) 0.18 0.04 h / .05), transparent 70%);
}
/* Center: symmetric soft overhead */
.scene[data-layout="center"] .hook-ambient-glow {
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, oklch(from var(--acc) 0.24 0.05 h / .07), transparent 65%);
}
/* Right: top-right bloom — mirrored editorial */
.scene[data-layout="right"] .hook-ambient-glow {
  background:
    radial-gradient(ellipse 55% 40% at 100% 0%, oklch(from var(--acc) 0.30 0.07 h / .10), transparent 65%),
    radial-gradient(ellipse 30% 50% at 0% 100%, oklch(from var(--acc) 0.18 0.04 h / .04), transparent 70%);
}
/* hookGlowBreathe removed — static opacity used instead */
</style>

<div class="scene hook-scene" data-layout="{{LAYOUT}}">
  <div class="hook-bg"></div>
  <div class="hook-ambient-glow" aria-hidden="true"></div>
  <div class="rule-left"></div>
  <div class="scene-label">{{HUD_TAG}}</div>
  <div class="hook-kw-wrap">
    <div class="hook-kw">{{KEYWORD}}</div>
    <span class="hook-rule"></span>
  </div>
  <div class="hook-body">{{BODY}}</div>
  <div class="brand">{{BRAND}}</div>
  <div class="beat-counter">{{BEAT_INDEX}} / {{BEAT_TOTAL}}</div>
  <div class="grain" aria-hidden="true"></div>
  <div class="vignette"></div>
</div>

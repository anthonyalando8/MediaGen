<!-- scenes/hook.html -->
<!-- Injected variables: {{KEYWORD}}, {{BODY}}, {{HUD_TAG}}, {{BRAND}} -->
<!-- Accent set via :root { --acc: ...; --spike: ...; } injected before this -->

<style>
.hook-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(55% 45% at 25% 75%, oklch(from var(--acc) 0.38 0.14 h / .55), transparent 70%),
    radial-gradient(45% 40% at 80% 20%, oklch(from var(--acc) 0.35 0.08 h / .35), transparent 65%),
    var(--bg);
}
.hook-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(oklch(1 0 0 / .05) 1px, transparent 1px),
    linear-gradient(90deg, oklch(1 0 0 / .05) 1px, transparent 1px);
  background-size: 32px 32px;
  mask-image: radial-gradient(55% 55% at 28% 65%, black, transparent 72%);
  animation: gridDrift 20s linear infinite;
}
.hook-bloom {
  position: absolute;
  width: 65%; height: 55%;
  left: -12%; top: 38%;
  background: radial-gradient(circle, var(--acc) 0%, transparent 60%);
  filter: blur(50px);
  opacity: 0.45;
  animation: bloomPulse 4.5s ease-in-out infinite;
}
.hook-particles {
  position: absolute; inset: 0;
  pointer-events: none;
}
.hook-particles span {
  position: absolute;
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--acc);
  box-shadow: 0 0 10px var(--acc);
}
.hook-particles span:nth-child(1) { top: 14%; left: 20%; animation: wordIn 6s ease-in-out infinite; }
.hook-particles span:nth-child(2) { top: 30%; left: 72%; animation: wordIn 7s ease-in-out infinite .5s; width:2px; height:2px; }
.hook-particles span:nth-child(3) { top: 62%; left: 16%; animation: wordIn 5.5s ease-in-out infinite .9s; }
.hook-particles span:nth-child(4) { top: 78%; left: 62%; animation: wordIn 8s ease-in-out infinite 1.3s; width:2px; height:2px; }
.hook-particles span:nth-child(5) { top: 45%; left: 88%; animation: wordIn 6.5s ease-in-out infinite .2s; }

/* Kinetic keyword stack */
.hook-stack {
  position: absolute;
  top: calc(var(--safe-top) + 120px);
  left: var(--left-mg);
  right: 72px;
  z-index: 4;
}
.hook-word-pre {
  font-size: 44px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: oklch(1 0 0 / .55);
  line-height: 1;
  margin-bottom: 8px;
  display: flex; flex-wrap: wrap; gap: 10px;
}
.hook-word-pre span {
  display: inline-block;
  opacity: 0;
  animation: wordIn 0.55s cubic-bezier(.2,.9,.25,1.05) forwards;
}
.hook-word-pre span:nth-child(1) { animation-delay: 0.0s; }
.hook-word-pre span:nth-child(2) { animation-delay: 0.14s; }
.hook-word-pre span:nth-child(3) { animation-delay: 0.28s; }

.hook-keyword {
  font-size: var(--sz-hero);
  font-weight: 700;
  letter-spacing: -0.055em;
  line-height: 0.88;
  color: var(--fg);
  text-transform: uppercase;
  text-shadow:
    0 0 40px oklch(from var(--acc) l c h / .45),
    0 0 80px oklch(from var(--acc) l c h / .25),
    0 5px 0 oklch(0 0 0 / .5);
  opacity: 0;
  animation: wordPunch 0.75s cubic-bezier(.2,.9,.25,1.18) 0.55s forwards;
}

.hook-underline {
  height: 7px;
  width: 0%;
  border-radius: 4px;
  background: var(--acc);
  margin-top: 14px;
  animation: underlineGrow 0.5s ease-out 1.1s forwards;
}
@keyframes underlineGrow {
  from { width: 0%; }
  to   { width: min(100%, calc(1080px - var(--left-mg) * 2)); }
}

.hook-body {
  margin-top: 40px;
  font-size: var(--sz-body);
  font-weight: 500;
  line-height: 1.2;
  letter-spacing: -0.01em;
  color: var(--fg-2);
  text-shadow: 0 2px 0 oklch(0 0 0 / .35);
  opacity: 0;
  animation: lineIn 0.5s ease-out 1.4s forwards;
}
</style>

<div class="scene">
  <div class="hook-bg"></div>
  <div class="hook-grid"></div>
  <div class="hook-bloom"></div>
  <div class="hook-particles">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="hud-tag">{{HUD_TAG}}</div>

  <div class="hook-stack">
    <div class="hook-keyword">{{KEYWORD}}</div>
    <div class="hook-underline"></div>
    <div class="hook-body">{{BODY}}</div>
  </div>

  <div class="brand">{{BRAND}}</div>
  <div class="grain"></div>
  <div class="vignette"></div>
</div>

<!-- scenes/hook.html -->
<!-- Variables: {{KEYWORD}}, {{BODY}}, {{HUD_TAG}}, {{BRAND}} -->

<!--
  HOOK SCENE DESIGN RATIONALE
  ─────────────────────────────
  This is the first thing the audience sees. It needs to stop scrolling.
  The way to stop a scroll is WEIGHT, not movement.

  What stops scroll: a massive word they haven't seen styled this way.
  What doesn't stop scroll: glowing particles, grid animations, bloomPulse.

  Composition:
  ─ Keyword occupies the top half of the safe zone. Big. Unavoidable.
  ─ It is left-anchored and bleeds toward the right edge — intentional
    asymmetry. The right side has nothing. Tension.
  ─ Body text sits in the lower third, separated by real space.
  ─ The scene "camera" performs a barely-perceptible settle (8px over 1.8s).
    You feel it more than see it — gives the static frame a sense of arrival.

  Motion sequence:
  0.00s — label slides in from left
  0.40s — keyword arrives from below (the main statement)
  0.90s — thin accent rule draws left-to-right
  1.05s — body text lifts in, slow

  Background: pure dark. No gradient. No glow.
  The keyword IS the visual.
-->

<style>
/* The scene itself performs the camera settle */
.scene.hook-scene {
  animation: cameraSettle 1.8s cubic-bezier(0.16,1,0.3,1) forwards;
}

/* Subtle tonal background — not a gradient, just two tones */
.hook-bg {
  position: absolute;
  inset: 0;
  /* A very faint warm light source, upper left, as if lit from off-screen.
     opacity so low it reads as atmospheric, not decorative. */
  background:
    radial-gradient(80% 60% at 0% 0%, oklch(from var(--acc) 0.22 0.04 h / .08), transparent 60%),
    var(--bg);
}

/* Keyword — the entire composition */
.hook-kw-wrap {
  position: absolute;
  top: calc(var(--safe-top) + 80px);
  left: var(--left);
  right: 0;           /* intentionally bleeds to right edge — no right margin */
  z-index: 4;
}

.hook-kw {
  font-size: var(--sz-hero);
  font-weight: 700;
  letter-spacing: -0.055em;
  line-height: 0.88;
  color: var(--fg);
  text-transform: uppercase;

  /* Each word on its own line is handled by the line-break approach below.
     Long keywords wrap naturally. */
  word-break: break-word;

  opacity: 0;
  animation: titleReveal 0.85s cubic-bezier(0.16,1,0.3,1) 0.40s forwards;
}

/* Accent underline: a 2px coloured rule below the keyword.
   Width is proportional — set to auto via transform, not width animation.
   The rule draws from left anchor. */
.hook-rule {
  display: block;
  margin-top: 20px;
  margin-left: 0;
  width: min(600px, calc(1080px - var(--left) * 2));
  height: 2px;
  background: var(--acc);
  transform: scaleX(0);
  transform-origin: left center;
  animation: ruleReveal 0.45s cubic-bezier(0.16,1,0.3,1) 0.90s forwards;
}

/* Body: positioned in the lower portion of the safe zone */
.hook-body {
  position: absolute;
  top: calc(var(--safe-top) + 700px);
  left: var(--left);
  right: calc(var(--right) + 80px);   /* shorter line = faster to read */
  z-index: 4;

  font-size: var(--sz-body);
  font-weight: 400;
  line-height: 1.30;
  letter-spacing: -0.01em;
  color: var(--fg-2);

  opacity: 0;
  animation: bodyReveal 0.70s cubic-bezier(0.16,1,0.3,1) 1.05s forwards;
}
</style>

<div class="scene hook-scene">
  <div class="hook-bg"></div>

  <div class="rule-left"></div>
  <div class="scene-label">{{HUD_TAG}}</div>

  <div class="hook-kw-wrap">
    <div class="hook-kw">{{KEYWORD}}</div>
    <span class="hook-rule"></span>
  </div>

  <div class="hook-body">{{BODY}}</div>

  <div class="brand">{{BRAND}}</div>
  <div class="vignette"></div>
</div>

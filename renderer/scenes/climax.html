<!-- scenes/climax.html -->
<!-- Variables: {{KEYWORD}}, {{BODY}}, {{HUD_TAG}}, {{BRAND}} -->

<!--
  CLIMAX SCENE DESIGN RATIONALE
  ─────────────────────────────────
  Beat 3. The pivot. The uncomfortable truth or the key insight.
  This scene should feel different from the others — but not louder.
  Different in pace, not in decoration.

  What the previous design got wrong:
  ─ glitchIn (clip-path steps) — this is a 2016 cyberpunk UI pattern.
    It immediately reads as "template from a motion graphics pack".
  ─ chromatic aberration pseudo-elements — same problem, overused.
  ─ bloomPulse on the background — the pulsing background competes
    with the text. The background should be still. The text is the event.
  ─ depth-far and depth-mid (ghost blurred keyword layers) — the multiple
    depth copies create visual noise. Delete them.

  New approach:
  ─ The spike colour (--spike, set to var(--acc) override below) gives
    the scene its differentiation. Colour alone is enough.
  ─ The keyword enters with a longer delay than other scenes — 0.6s.
    The pause before it lands IS the dramatic effect.
  ─ A larger type size creates the "wow" — size, not glow.
  ─ The background has a very faint horizontal light band positioned
    just behind the keyword — like a practical light source.
    Pure atmosphere, no animation.

  Motion sequence:
  0.00s — label
  0.60s — keyword (delayed — the pause creates tension)
  1.20s — rule
  1.35s — body

  The 0.6s delay on the keyword is the entire cinematic effect.
  If you cut the delay to 0.3s it becomes just another scene.
-->

<style>
/* Switch to spike hue for this entire scene */
.scene.climax-scene {
  --acc: var(--spike, #e8804a);   /* fallback to warm orange if --spike not set */
}
.scene.climax-scene .rule-left::after {
  background: var(--acc);
}

/* Faint practical light — static, no animation */
.climax-light {
  position: absolute;
  top: 28%;
  left: -8%;
  right: -8%;
  height: 38%;
  background: radial-gradient(
    ellipse 70% 50% at 28% 50%,
    oklch(from var(--acc) 0.28 0.06 h / .09),
    transparent 65%
  );
  pointer-events: none;
  z-index: 1;
}

.climax-content {
  position: absolute;
  top: calc(var(--safe-top) + 50px);
  left: calc(var(--left) + 20px);
  right: 0;   /* bleeds right — same as hook, signals elevated intensity */
  z-index: 4;
}

/* Keyword: larger than insight, hero-scale */
.climax-kw {
  font-size: var(--sz-hero);
  font-weight: 700;
  letter-spacing: -0.055em;
  line-height: 0.88;
  color: var(--fg);
  text-transform: uppercase;
  word-break: break-word;

  /* NO text-shadow, NO glow. The colour does the work. */
  opacity: 0;
  animation: titleReveal 0.90s cubic-bezier(0.16,1,0.3,1) 0.60s forwards;
}

/* The accent-coloured rule under the keyword is wider here — more emphatic */
.climax-rule {
  display: block;
  margin-top: 22px;
  width: min(480px, calc(1080px - var(--left) * 2));
  height: 2px;
  background: var(--acc);
  transform: scaleX(0);
  transform-origin: left center;
  animation: ruleReveal 0.40s cubic-bezier(0.16,1,0.3,1) 1.20s forwards;
}

.climax-body {
  position: absolute;
  top: calc(var(--safe-top) + 680px);
  left: calc(var(--left) + 20px);
  right: calc(var(--right) + 100px);
  z-index: 4;

  font-size: var(--sz-body);
  font-weight: 400;
  line-height: 1.30;
  letter-spacing: -0.01em;
  color: var(--fg-2);

  opacity: 0;
  animation: bodyReveal 0.70s cubic-bezier(0.16,1,0.3,1) 1.35s forwards;
}
</style>

<div class="scene climax-scene">
  <div class="climax-light"></div>

  <div class="rule-left"></div>
  <div class="scene-label">{{HUD_TAG}}</div>

  <div class="climax-content">
    <div class="climax-kw">{{KEYWORD}}</div>
    <span class="climax-rule"></span>
  </div>

  <div class="climax-body">{{BODY}}</div>

  <div class="brand">{{BRAND}}</div>
  <div class="vignette"></div>
</div>

<!-- scenes/climax.html -->
<!-- Variables: {{KEYWORD}}, {{BODY}}, {{HUD_TAG}}, {{BRAND}}, {{LAYOUT}} -->

<style>
/* Spike hue override for entire scene */
.scene.climax-scene { --acc: var(--spike, #e8804a); }
.scene.climax-scene .rule-left::after { background: var(--acc); }

/* ── LEFT ─────────────────────────────────────────────── */
.scene[data-layout="left"] .climax-light {
  background: radial-gradient(ellipse 70% 50% at 20% 50%, oklch(from var(--acc) 0.55 0.12 h / .26), transparent 65%);
}
.scene[data-layout="left"] .climax-content {
  top: calc(var(--safe-top) + 50px);
  left: calc(var(--left) + 20px);
  right: 0;
}
.scene[data-layout="left"] .climax-kw {
  animation: titleReveal 0.90s cubic-bezier(0.16,1,0.3,1) 0.60s forwards;
}
.scene[data-layout="left"] .climax-body {
  top: calc(var(--safe-top) + 680px);
  left: calc(var(--left) + 20px);
  right: calc(var(--right) + 100px);
}

/* ── CENTER ───────────────────────────────────────────── */
.scene[data-layout="center"] .climax-light {
  background: radial-gradient(ellipse 70% 55% at 50% 45%, oklch(from var(--acc) 0.55 0.13 h / .30), transparent 65%);
}
.scene[data-layout="center"] .climax-content {
  top: calc(var(--safe-top) + 160px);
  left: var(--left);
  right: var(--right);
  text-align: center;
}
.scene[data-layout="center"] .climax-kw {
  font-weight: 700;
  letter-spacing: -0.02em;   /* less compressed — more gravitas */
  animation: titleReveal 1.1s cubic-bezier(0.16,1,0.3,1) 0.70s forwards;
}
.scene[data-layout="center"] .climax-rule {
  margin-left: auto; margin-right: auto;
  animation: ruleRevealCenter 0.40s cubic-bezier(0.16,1,0.3,1) 1.45s forwards;
}
.scene[data-layout="center"] .climax-body {
  top: calc(var(--safe-top) + 660px);
  left: calc(var(--left) + 60px);
  right: calc(var(--right) + 60px);
  text-align: center;
}

/* ── RIGHT ────────────────────────────────────────────── */
.scene[data-layout="right"] .climax-light {
  background: radial-gradient(ellipse 70% 50% at 80% 50%, oklch(from var(--acc) 0.55 0.12 h / .26), transparent 65%);
}
.scene[data-layout="right"] .climax-content {
  top: calc(var(--safe-top) + 50px);
  left: 0;
  right: calc(var(--right) + 20px);
  text-align: right;
}
.scene[data-layout="right"] .climax-kw {
  animation: titleRevealRight 0.90s cubic-bezier(0.16,1,0.3,1) 0.60s forwards;
}
.scene[data-layout="right"] .climax-rule {
  margin-left: auto;
  transform-origin: right center;
}
.scene[data-layout="right"] .climax-body {
  top: calc(var(--safe-top) + 680px);
  left: calc(var(--left) + 80px);
  right: calc(var(--right) + 20px);
  text-align: right;
}

/* ── FULL ─────────────────────────────────────────────── */
.scene[data-layout="full"] .climax-light {
  background: radial-gradient(ellipse 90% 60% at 50% 40%, oklch(from var(--acc) 0.58 0.14 h / .34), transparent 65%);
}
.scene[data-layout="full"] .climax-content {
  top: calc(var(--safe-top) + 20px);
  left: var(--left);
  right: 0;
}
.scene[data-layout="full"] .climax-kw {
  font-size: calc(var(--sz-hero) * 1.3);
  animation: titleRevealFull 0.65s cubic-bezier(0.16,1,0.3,1) 0.50s forwards;
}
.scene[data-layout="full"] .climax-body {
  top: calc(var(--safe-top) + 900px);
  left: var(--left);
  right: calc(var(--right) + 60px);
}

/* ── SHARED ───────────────────────────────────────────── */
.climax-light {
  position: absolute;
  top: 20%; left: -8%; right: -8%; height: 45%;
  pointer-events: none;
  z-index: var(--z-bg);
}
.climax-content {
  position: absolute;
  z-index: var(--z-fg);
}
.climax-kw {
  font-size: var(--sz-hero);
  font-weight: 700;
  letter-spacing: -0.055em;
  line-height: 0.88;
  color: var(--fg);
  text-transform: uppercase;
  word-break: break-word;
  opacity: 0;
}
.climax-rule {
  display: block;
  margin-top: 22px;
  width: min(480px, calc(1080px - var(--left) * 2));
  height: 2px;
  background: var(--acc);
  transform: scaleX(0);
  transform-origin: left center;
  animation: ruleReveal 0.40s cubic-bezier(0.16,1,0.3,1) 1.20s forwards;
}
.climax-body {
  position: absolute;
  z-index: var(--z-fg);
  font-size: var(--sz-body);
  font-weight: 400;
  line-height: 1.30;
  letter-spacing: -0.01em;
  color: var(--fg-2);
  opacity: 0;
  animation: bodyReveal 0.70s cubic-bezier(0.16,1,0.3,1) 1.35s forwards;
}

/* ── AMBIENT GLOW ─────────────────────────────────────────────── */
/* Climax: energy erupts from the center outward.
   Uses the spike colour (set via --acc override on .climax-scene).
   Faster pulse cycle — this beat is explosive.
   The scale pulse adds a physical sense of expansion. */
.climax-ambient-glow {
  position: absolute;
  inset: -60px;   /* bleed past edges for fullness */
  pointer-events: none;
  z-index: var(--z-bg);
  /* Static at peak intensity — climax glow is at full power. */
  opacity: 0.85;
}
.scene[data-layout="left"] .climax-ambient-glow,
.scene[data-layout="full"] .climax-ambient-glow {
  background:
    radial-gradient(ellipse 70% 55% at 25% 45%, oklch(from var(--acc) 0.60 0.14 h / .34), transparent 60%),
    radial-gradient(ellipse 45% 35% at 80% 75%, oklch(from var(--acc) 0.46 0.10 h / .20), transparent 65%);
}
.scene[data-layout="center"] .climax-ambient-glow {
  background:
    radial-gradient(ellipse 75% 60% at 50% 42%, oklch(from var(--acc) 0.60 0.15 h / .38), transparent 58%),
    radial-gradient(ellipse 40% 30% at 50% 90%, oklch(from var(--acc) 0.44 0.10 h / .18), transparent 65%);
}
.scene[data-layout="right"] .climax-ambient-glow {
  background:
    radial-gradient(ellipse 70% 55% at 75% 45%, oklch(from var(--acc) 0.60 0.14 h / .34), transparent 60%),
    radial-gradient(ellipse 40% 35% at 15% 75%, oklch(from var(--acc) 0.46 0.10 h / .20), transparent 65%);
}
/* climaxGlowErupt removed — static opacity used instead */
</style>

<div class="scene climax-scene" data-layout="{{LAYOUT}}">
  <div class="climax-light"></div>
  <div class="climax-ambient-glow" aria-hidden="true"></div>
  <div class="rule-left"></div>
  <div class="scene-label">{{HUD_TAG}}</div>
  <div class="climax-content">
    <div class="climax-kw">{{KEYWORD}}</div>
    <span class="climax-rule"></span>
  </div>
  <div class="climax-body">{{BODY}}</div>
  <div class="brand">{{BRAND}}</div>
  <div class="beat-counter">{{BEAT_INDEX}} / {{BEAT_TOTAL}}</div>
  <div class="grain" aria-hidden="true"></div>
  <div class="vignette"></div>
</div>

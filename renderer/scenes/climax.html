<!-- scenes/climax.html -->
<!-- Uses --spike as primary accent. Injected: {{KEYWORD}}, {{BODY}}, {{HUD_TAG}}, {{BRAND}} -->

<style>
/* Override accent to spike for this whole scene */
.scene { --acc: var(--spike); }
.scene::before { background: var(--spike); }
.scene::after  { background: var(--spike); }

.climax-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(60% 50% at 15% 65%, oklch(from var(--spike) 0.35 0.15 h / .45), transparent 65%),
    radial-gradient(50% 40% at 80% 30%, oklch(from var(--spike) 0.28 0.1 h / .3), transparent 65%),
    var(--bg);
}

.climax-bloom {
  position: absolute;
  width: 70%; height: 60%;
  left: -15%; top: 30%;
  background: radial-gradient(circle, var(--spike) 0%, transparent 60%);
  filter: blur(65px);
  opacity: 0.35;
  animation: bloomPulse 3.5s ease-in-out infinite;
}

/* Depth layers — parallax ghost words */
.depth-far {
  position: absolute;
  top: 8%; left: -5%;
  font-size: 220px;
  font-weight: 700;
  letter-spacing: -0.06em;
  color: oklch(1 0 0 / .03);
  pointer-events: none;
  filter: blur(10px);
  animation: parallaxSlow 16s ease-in-out infinite alternate;
  z-index: 1;
}
.depth-mid {
  position: absolute;
  top: 15%; left: -2%;
  font-size: 220px;
  font-weight: 700;
  letter-spacing: -0.06em;
  color: oklch(1 0 0 / .06);
  pointer-events: none;
  filter: blur(3px);
  animation: parallaxSlow 10s ease-in-out infinite alternate-reverse;
  z-index: 2;
}

.climax-content {
  position: absolute;
  top: calc(var(--safe-top) + 140px);
  left: var(--left-mg);
  right: 72px;
  z-index: 4;
}

.climax-keyword {
  font-size: var(--sz-hero);
  font-weight: 700;
  letter-spacing: -0.055em;
  line-height: 0.88;
  color: var(--fg);
  text-transform: uppercase;
  text-shadow:
    0 0 50px oklch(from var(--spike) l c h / .5),
    0 0 100px oklch(from var(--spike) l c h / .3),
    0 5px 0 oklch(0 0 0 / .5);
  position: relative;
  animation: glitchIn 0.6s steps(3) forwards;
}

/* Chromatic aberration fringe on keyword */
.climax-keyword::before {
  content: attr(data-text);
  position: absolute; inset: 0;
  color: oklch(from var(--acc) l c h);
  transform: translateX(-3px);
  mix-blend-mode: screen;
  opacity: 0.7;
  animation: glitchB 4s infinite steps(10);
}
.climax-keyword::after {
  content: attr(data-text);
  position: absolute; inset: 0;
  color: oklch(from var(--spike) l c h);
  transform: translateX(3px);
  mix-blend-mode: screen;
  opacity: 0.7;
  animation: glitchR 4s infinite steps(10);
}

.climax-underline {
  height: 8px;
  width: 0%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--spike), oklch(from var(--spike) l c h / .2));
  margin-top: 16px;
  animation: underlineGrow 0.5s ease-out 0.55s forwards;
}
@keyframes underlineGrow {
  from { width: 0%; }
  to   { width: 100%; }
}

.climax-body {
  margin-top: 44px;
  font-size: var(--sz-body);
  font-weight: 500;
  line-height: 1.2;
  letter-spacing: -0.01em;
  color: var(--fg-2);
  text-shadow: 0 2px 0 oklch(0 0 0 / .35);
  opacity: 0;
  animation: lineIn 0.5s ease-out 0.9s forwards;
}

/* Chroma fringe overlay */
.chroma-fringe {
  position: absolute; inset: 0;
  background: linear-gradient(
    90deg,
    oklch(from var(--spike) l c h / .07) 0%,
    transparent 35%,
    transparent 65%,
    oklch(from var(--acc) l c h / .07) 100%
  );
  mix-blend-mode: screen;
  pointer-events: none;
  z-index: 7;
}
</style>

<div class="scene">
  <div class="climax-bg"></div>
  <div class="climax-bloom"></div>
  <div class="depth-far">{{KEYWORD}}</div>
  <div class="depth-mid">{{KEYWORD}}</div>

  <div class="hud-tag">{{HUD_TAG}}</div>

  <div class="climax-content">
    <div class="climax-keyword" data-text="{{KEYWORD}}">{{KEYWORD}}</div>
    <div class="climax-underline"></div>
    <div class="climax-body">{{BODY}}</div>
  </div>

  <div class="brand">{{BRAND}}</div>
  <div class="chroma-fringe"></div>
  <div class="grain"></div>
  <div class="vignette"></div>
</div>
